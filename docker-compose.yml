version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_content_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ai_content_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecret}
      POSTGRES_DB: ${DB_NAME:-ai_content_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai_content_user} -d ${DB_NAME:-ai_content_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_content_network

  redis:
    image: redis:7-alpine
    container_name: ai_content_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redissecret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_content_network

  # Optional: pgAdmin for DB inspection during development
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai_content_pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_content_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai_content_network:
    driver: bridge
